<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chinese Flash Cards</title>
  <style>
    :root {
      color-scheme: light;
    }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: #f5f6f8;
      color: #111827;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    body.nightModeActive {
      background: #0f172a;
      color: #e5e7eb;
    }
    .appMainLayoutRow {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: center;
      gap: 20px;
      width: 100%;
      max-width: min(1040px, 96vw);
      box-sizing: border-box;
      padding: 0 12px;
    }
    .pageContainer {
      flex: 1 1 320px;
      max-width: min(720px, 100%);
      display: grid;
      gap: 16px;
      justify-items: center;
    }
    .learnModeStateAsideColumn {
      flex: 0 0 auto;
      display: flex;
      position:fixed;
      right:0px;
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
      padding-top: 4px;
    }
    .learnModeStateAsideColumn[hidden] {
      display: none !important;
    }
    .learnModeStateAsideColumn .navButton.secondaryButton {
      width: 100%;
      box-sizing: border-box;
      text-align: center;
    }
    .auxControlsRow {
      width: 100%;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }
    .flashCard {
      width: 100%;
      height: 70vh;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      user-select: none;
      position: relative;
    }
    .desktopArrowKeysHintPanelElement {
      display: none;
      position: absolute;
      left: 14px;
      bottom: 14px;
      z-index: 2;
      pointer-events: none;
      opacity: 0.4;
    }
    @media (min-width: 768px) {
      .desktopArrowKeysHintPanelElement {
        display: block;
      }
    }
    .arrowKeysMiniDiagramGrid {
      display: grid;
      grid-template-columns: repeat(3, 24px);
      grid-template-rows: repeat(2, 22px);
      gap: 4px;
      align-items: center;
      justify-items: center;
    }
    .arrowKeysMiniKey {
      width: 24px;
      height: 22px;
      box-sizing: border-box;
      border: 1px solid #9ca3af;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.85);
      color: #374151;
      font-size: 11px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
    }
    body.nightModeActive .arrowKeysMiniKey {
      border-color: #64748b;
      background: rgba(30, 41, 59, 0.75);
      color: #cbd5e1;
    }
    .arrowKeysMiniKeyUp {
      grid-column: 2;
      grid-row: 1;
    }
    .arrowKeysMiniKeyLeft {
      grid-column: 1;
      grid-row: 2;
    }
    .arrowKeysMiniKeyDown {
      grid-column: 2;
      grid-row: 2;
    }
    .arrowKeysMiniKeyRight {
      grid-column: 3;
      grid-row: 2;
    }
    body.nightModeActive .flashCard {
      background: #111827;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }
    .flashCard:active {
      transform: scale(0.99);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
    }
    .cardContent {
      display: grid;
      gap: 12px;
      text-align: center;
    }
    .characterRow {
      display: grid;
      gap: 8px;
      font-size: clamp(64px, 12vw, 120px);
      font-weight: 600;
      letter-spacing: 4px;
    }
    .characterValue {
      font-size: clamp(120px, 12vw, 400px);
      font-weight: 600;
      letter-spacing: 4px;
    }
    .characterLabel {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #6b7280;
      opacity: 0.2;
    }
    body.nightModeActive .characterLabel {
      color: #9ca3af;
    }
    .detailRow {
      display: grid;
      gap: 8px;
      font-size: 18px;
    }
    .detailLabel {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #6b7280;
    }
    body.nightModeActive .detailLabel {
      color: #9ca3af;
    }
    .detailPinyinTextValue {
      font-size: clamp(36px, 5.5vw, 82px);
      font-weight: 500;
      line-height: 1.35;
      letter-spacing: 0.04em;
    }
    .navigationRow {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: center;
      width: 100%;
    }
    .navButton {
      border: none;
      border-radius: 999px;
      padding: 10px 18px;
      background: #111827;
      color: #ffffff;
      font-size: 14px;
      cursor: pointer;
    }
    .navButton.navButtonWithHoldProgress {
      position: relative;
      overflow: hidden;
    }
    .navButtonHoldProgressFillElement {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 100%;
      transform: scaleX(0);
      transform-origin: left center;
      pointer-events: none;
      transition: transform 0s linear;
      z-index: 0;
    }
    .navButtonHoldProgressFillElementWrong {
      background: linear-gradient(
        90deg,
        rgba(185, 28, 28, 0.92),
        rgba(248, 113, 113, 0.75)
      );
    }
    .navButtonHoldProgressFillElementRight {
      background: linear-gradient(
        90deg,
        rgba(21, 128, 61, 0.92),
        rgba(74, 222, 128, 0.78)
      );
    }
    .navButtonHoldProgressFillElement.navButtonHoldProgressFillAnimating {
      transition: transform var(--navButtonHoldToActivateDuration) linear;
      transform: scaleX(1);
    }
    .navButtonLabelSpanElement {
      position: relative;
      z-index: 1;
    }
    .navButton.secondaryButton {
      padding: 6px 12px;
      font-size: 12px;
    }
    .learnModeLabel {
      font-size: 24px;
      color: #6b7280;
      padding: 10px 18px;
    }
    body.nightModeActive .learnModeLabel {
      color: #9ca3af;
    }
    body.nightModeActive .navButton {
      background: #e5e7eb;
      color: #111827;
    }
    .navButton:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
    body.nightModeActive .navButton:disabled {
      background: #475569;
      color: #e2e8f0;
    }
    .positionText {
      font-size: 14px;
      color: #6b7280;
    }
    body.nightModeActive .positionText {
      color: #9ca3af;
    }
    .seenCountText {
      font-size: 13px;
      color: #6b7280;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      opacity: 0.2;
    }
    .unimportantInfo {
        opacity: 0.2;
    }
    body.nightModeActive .seenCountText {
      color: #9ca3af;
    }
    .ttsButton {
      border: 1px solid #d1d5db;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 12px;
      background: #ffffff;
      color: #111827;
      cursor: pointer;
      justify-self: center;
    }
    .ttsButton {
      border: 1px solid #d1d5db;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 12px;
      background: #ffffff;
      color: #111827;
      cursor: pointer;
      justify-self: center;
    }
    body.nightModeActive .ttsButton {
      border-color: #334155;
      background: #111827;
      color: #e5e7eb;
    }
    .levelSelector {
      border: 1px solid #d1d5db;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 14px;
      background: #ffffff;
      color: #111827;
    }
    body.nightModeActive .levelSelector {
      border-color: #334155;
      background: #111827;
      color: #e5e7eb;
    }
  </style>
</head>
<body>
  <div class="appMainLayoutRow">
    <div class="pageContainer">
      <div class="auxControlsRow">
        <button class="navButton secondaryButton" id="nightModeToggleButtonElement">Night Mode</button>
        <span id="learnModeLabelElement" class="learnModeLabel">Ordered Mode</span>
        <button class="navButton secondaryButton" id="learnModeSwitchButtonElement">Change Mode</button>
        <button class="ttsButton" id="ttsButtonElement"  style="border:0px;">
          <img src="soundicon.png" alt="Speak"/>
        </button>
      </div>
      <div class="flashCard" id="flashCardElement">
        <div class="desktopArrowKeysHintPanelElement" aria-hidden="true">
          <div class="arrowKeysMiniDiagramGrid">
            <span class="arrowKeysMiniKey arrowKeysMiniKeyUp">↑</span>
            <span class="arrowKeysMiniKey arrowKeysMiniKeyLeft">←</span>
            <span class="arrowKeysMiniKey arrowKeysMiniKeyDown">↓</span>
            <span class="arrowKeysMiniKey arrowKeysMiniKeyRight">→</span>
          </div>
        </div>
        <div class="cardContent" id="cardContentElement"></div>
      </div>
      <div class="navigationRow">
        <button type="button" class="navButton navButtonWithHoldProgress" id="previousButtonElement">
          <span class="navButtonHoldProgressFillElement navButtonHoldProgressFillElementWrong" id="previousButtonHoldProgressFillElement" aria-hidden="true"></span>
          <span class="navButtonLabelSpanElement" id="previousButtonLabelSpanElement">Previous</span>
        </button>
        <select class="levelSelector" id="hskLevelSelectElement">
          <option value="1">HSK 1</option>
          <option value="2">HSK 2</option>
          <option value="3">HSK 3</option>
          <option value="4">HSK 4</option>
          <option value="5">HSK 5</option>
          <option value="6">HSK 6</option>
          <option value="all">All</option>
        </select>
        <select class="levelSelector" id="frequencySelectElement">
          <option value="200">Top 200</option>
          <option value="500">Top 500</option>
          <option value="1000">Top 1000</option>
          <option value="all">All</option>
        </select>
        <div class="positionText" id="positionTextElement"></div>
        <button type="button" class="navButton navButtonWithHoldProgress" id="nextButtonElement">
          <span class="navButtonHoldProgressFillElement navButtonHoldProgressFillElementRight" id="nextButtonHoldProgressFillElement" aria-hidden="true"></span>
          <span class="navButtonLabelSpanElement" id="nextButtonLabelSpanElement">Next</span>
        </button>
      </div>
    </div>
    <aside class="learnModeStateAsideColumn" id="learnModeStateAsideColumnElement" hidden>
      <button class="navButton secondaryButton" id="learnModeStateDownloadButtonElement">Save</button>
      <button class="navButton secondaryButton" id="learnModeStateUploadButtonElement">Load</button>
      <button class="navButton secondaryButton" id="learnModeStateResetButtonElement">Reset</button>
      <input type="file" id="learnModeStateFileInputElement" accept="application/json,.json" hidden />
    </aside>
  </div>

  <script src="radicalmapping.js"></script>
  <script src="flashcardDataList.js"></script>
  <script>
    const pageLoadTime = Date.now();
    let ttsTimeoutIdValue = null;
    const chineseFlashCardsDiagnosticLoggingEnabledValue = true;
    const logChineseFlashCardsDiagnosticMessage = (...diagnosticLogArgs) => {
      if (!chineseFlashCardsDiagnosticLoggingEnabledValue) {
        return;
      }
      console.log("[ChineseFlashCards]", ...diagnosticLogArgs);
    };
    const uiClickDebounceDelayMillisecondsValue = 100;
    const navButtonHoldToActivateDurationMillisecondsValue = 300;
    document.documentElement.style.setProperty(
      "--navButtonHoldToActivateDuration",
      `${navButtonHoldToActivateDurationMillisecondsValue}ms`
    );

    const registerDebouncedClickHandler = (
      targetElementValue,
      clickHandlerCallbackValue,
      optionalDebouncedClickHandlerLabelValue
    ) => {
      const debouncedClickHandlerLabelValue = optionalDebouncedClickHandlerLabelValue ?? targetElementValue.id ?? "debouncedClick";
      let debounceTimeoutIdValue = null;
      targetElementValue.addEventListener("click", () => {
        const debounceClickScheduleTimestampValue = Date.now();
        if (debounceTimeoutIdValue !== null) {
          clearTimeout(debounceTimeoutIdValue);
          logChineseFlashCardsDiagnosticMessage(
            "debounce: cleared pending timer",
            debouncedClickHandlerLabelValue,
            "at",
            debounceClickScheduleTimestampValue
          );
        }
        debounceTimeoutIdValue = setTimeout(() => {
          debounceTimeoutIdValue = null;
          logChineseFlashCardsDiagnosticMessage(
            "debounce: handler fired",
            debouncedClickHandlerLabelValue,
            "afterMs",
            Date.now() - debounceClickScheduleTimestampValue
          );
          clickHandlerCallbackValue();
        }, uiClickDebounceDelayMillisecondsValue);
        logChineseFlashCardsDiagnosticMessage(
          "debounce: timer scheduled",
          debouncedClickHandlerLabelValue,
          "delayMs",
          uiClickDebounceDelayMillisecondsValue
        );
      });
    };

    const createNavButtonHoldInteractionController = (
      buttonElementValue,
      fillElementValue,
      runActionCallbackValue,
      getShouldRequireHoldDurationBeforeNavButtonActionValue,
      optionalNavButtonHoldDiagnosticLabelValue
    ) => {
      const navButtonHoldDiagnosticLabelValue = optionalNavButtonHoldDiagnosticLabelValue ?? buttonElementValue.id ?? "navButtonHold";
      let navButtonHoldTimeoutIdValue = null;

      const resetNavButtonHoldProgressVisual = () => {
        fillElementValue.classList.remove("navButtonHoldProgressFillAnimating");
        fillElementValue.style.transition = "none";
        fillElementValue.style.removeProperty("transform");
        void fillElementValue.offsetWidth;
        fillElementValue.style.removeProperty("transition");
      };

      const cancelNavButtonHoldInteraction = () => {
        if (navButtonHoldTimeoutIdValue !== null) {
          logChineseFlashCardsDiagnosticMessage(
            "navHold: cancel cleared timer",
            navButtonHoldDiagnosticLabelValue,
            "at",
            Date.now()
          );
          clearTimeout(navButtonHoldTimeoutIdValue);
          navButtonHoldTimeoutIdValue = null;
        }
        resetNavButtonHoldProgressVisual();
      };

      const startNavButtonHoldInteraction = (interactionStartedFromKeyboardValue) => {
        if (buttonElementValue.disabled) {
          logChineseFlashCardsDiagnosticMessage("navHold: start ignored (disabled)", navButtonHoldDiagnosticLabelValue);
          return;
        }
        if (navButtonHoldTimeoutIdValue !== null) {
          logChineseFlashCardsDiagnosticMessage(
            "navHold: start ignored (timer already pending)",
            navButtonHoldDiagnosticLabelValue,
            "fromKeyboard",
            interactionStartedFromKeyboardValue
          );
          return;
        }
        resetNavButtonHoldProgressVisual();
        if (!getShouldRequireHoldDurationBeforeNavButtonActionValue()) {
          logChineseFlashCardsDiagnosticMessage(
            "navHold: immediate action (character side)",
            navButtonHoldDiagnosticLabelValue,
            "fromKeyboard",
            interactionStartedFromKeyboardValue
          );
          runActionCallbackValue();
          return;
        }
        if (!interactionStartedFromKeyboardValue) {
          logChineseFlashCardsDiagnosticMessage(
            "navHold: immediate action (pointer on answer side)",
            navButtonHoldDiagnosticLabelValue
          );
          runActionCallbackValue();
          return;
        }
        void fillElementValue.offsetWidth;
        fillElementValue.classList.add("navButtonHoldProgressFillAnimating");
        const navButtonHoldScheduleTimestampValue = Date.now();
        logChineseFlashCardsDiagnosticMessage(
          "navHold: keyboard hold timer scheduled",
          navButtonHoldDiagnosticLabelValue,
          "delayMs",
          navButtonHoldToActivateDurationMillisecondsValue,
          "at",
          navButtonHoldScheduleTimestampValue
        );
        navButtonHoldTimeoutIdValue = setTimeout(() => {
          navButtonHoldTimeoutIdValue = null;
          logChineseFlashCardsDiagnosticMessage(
            "navHold: keyboard hold timer fired",
            navButtonHoldDiagnosticLabelValue,
            "afterMs",
            Date.now() - navButtonHoldScheduleTimestampValue
          );
          resetNavButtonHoldProgressVisual();
          runActionCallbackValue();
        }, navButtonHoldToActivateDurationMillisecondsValue);
      };

      buttonElementValue.addEventListener("mousedown", (pointerEventValue) => {
        if (pointerEventValue.button !== 0) {
          return;
        }
        pointerEventValue.preventDefault();
        startNavButtonHoldInteraction(false);
      });
      buttonElementValue.addEventListener("mouseup", cancelNavButtonHoldInteraction);
      buttonElementValue.addEventListener("mouseleave", cancelNavButtonHoldInteraction);
      buttonElementValue.addEventListener("touchstart", (touchEventValue) => {
        touchEventValue.preventDefault();
        startNavButtonHoldInteraction(false);
      }, { passive: false });
      buttonElementValue.addEventListener("touchend", cancelNavButtonHoldInteraction);
      buttonElementValue.addEventListener("touchcancel", cancelNavButtonHoldInteraction);
      buttonElementValue.addEventListener("click", (clickEventValue) => {
        clickEventValue.preventDefault();
        clickEventValue.stopPropagation();
      });

      return { startNavButtonHoldInteraction, cancelNavButtonHoldInteraction };
    };

    const localStorageKeyNameMap = {
      nightModeEnabled: "chineseFlashCardsNightModeEnabled",
      seenCountByCharacter: "chineseFlashCardsSeenCountByCharacter",
      hskLevelSelection: "chineseFlashCardsHskLevelSelection",
      frequencySelection: "chineseFlashCardsFrequencySelection",
      learnModeEnabled: "chineseFlashCardsLearnModeEnabled",
      learnModeState: "chineseFlashCardsLearnModeState"
    };

    const learnModeStateStorageSchemaVersionValue = 1;

    const loadSeenCountByCharacterMapFromLocalStorage = () => {
      const seenCountByCharacterStorageValue = localStorage.getItem(localStorageKeyNameMap.seenCountByCharacter);
      if (!seenCountByCharacterStorageValue) {
        return {};
      }
      try {
        const parsedSeenCountByCharacterMapValue = JSON.parse(seenCountByCharacterStorageValue);
        return parsedSeenCountByCharacterMapValue && typeof parsedSeenCountByCharacterMapValue === "object"
          ? parsedSeenCountByCharacterMapValue
          : {};
      } catch (errorValue) {
        return {};
      }
    };

    const saveSeenCountByCharacterMapToLocalStorage = (seenCountByCharacterMapValue) => {
      localStorage.setItem(localStorageKeyNameMap.seenCountByCharacter, JSON.stringify(seenCountByCharacterMapValue));
    };

    const getSeenCountKeyFromCardData = (cardDataValue) => cardDataValue.simplified;

    const loadNightModeEnabledValueFromLocalStorage = () => {
      return localStorage.getItem(localStorageKeyNameMap.nightModeEnabled) === "true";
    };

    const saveNightModeEnabledValueToLocalStorage = (nightModeEnabledValue) => {
      localStorage.setItem(localStorageKeyNameMap.nightModeEnabled, nightModeEnabledValue ? "true" : "false");
    };

    const loadHskLevelSelectionValueFromLocalStorage = () => {
      const hskLevelSelectionStorageValue = localStorage.getItem(localStorageKeyNameMap.hskLevelSelection);
      return hskLevelSelectionStorageValue ? hskLevelSelectionStorageValue : "all";
    };

    const saveHskLevelSelectionValueToLocalStorage = (hskLevelSelectionValue) => {
      localStorage.setItem(localStorageKeyNameMap.hskLevelSelection, hskLevelSelectionValue);
    };

    const loadFrequencySelectionValueFromLocalStorage = () => {
      const frequencySelectionStorageValue = localStorage.getItem(localStorageKeyNameMap.frequencySelection);
      return frequencySelectionStorageValue ? frequencySelectionStorageValue : "200";
    };

    const saveFrequencySelectionValueToLocalStorage = (frequencySelectionValue) => {
      localStorage.setItem(localStorageKeyNameMap.frequencySelection, frequencySelectionValue);
    };

    const loadLearnModeEnabledValueFromLocalStorage = () => {
      return localStorage.getItem(localStorageKeyNameMap.learnModeEnabled) !== "false";
    };

    const saveLearnModeEnabledValueToLocalStorage = (learnModeEnabledValue) => {
      localStorage.setItem(localStorageKeyNameMap.learnModeEnabled, learnModeEnabledValue ? "true" : "false");
    };

    const findCardDataBySimplifiedKeyInRandomizedDeck = (simplifiedCharacterKeyValue) => {
      return randomizedFlashCardDataList.find(
        (flashCardDataValue) => getSeenCountKeyFromCardData(flashCardDataValue) === simplifiedCharacterKeyValue
      );
    };

    const buildLearnModeStatePlainObjectForStorage = () => {
      return {
        schemaVersion: learnModeStateStorageSchemaVersionValue,
        learnModeEnabled: isLearnModeEnabledValue,
        poolEntryList: learnModePoolList.map((poolEntryValue) => ({
          simplifiedCharacterKey: getSeenCountKeyFromCardData(poolEntryValue.cardData),
          weight: poolEntryValue.weight
        })),
        currentLearnModePoolIndexValue,
        learnModeDeckIndexValue
      };
    };

    const persistLearnModeStateBundleToLocalStorage = () => {
      const learnModeStatePlainObjectValue = buildLearnModeStatePlainObjectForStorage();
      localStorage.setItem(localStorageKeyNameMap.learnModeState, JSON.stringify(learnModeStatePlainObjectValue));
      saveLearnModeEnabledValueToLocalStorage(learnModeStatePlainObjectValue.learnModeEnabled);
    };

    const loadLearnModeStatePlainObjectFromLocalStorage = () => {
      const learnModeStateRawStorageValue = localStorage.getItem(localStorageKeyNameMap.learnModeState);
      if (!learnModeStateRawStorageValue) {
        return null;
      }
      try {
        const parsedLearnModeStateValue = JSON.parse(learnModeStateRawStorageValue);
        return parsedLearnModeStateValue && typeof parsedLearnModeStateValue === "object" ? parsedLearnModeStateValue : null;
      } catch (errorValue) {
        return null;
      }
    };

    const isValidLearnModeStatePlainObjectForApply = (learnModeStatePlainObjectValue) => {
      if (!learnModeStatePlainObjectValue || learnModeStatePlainObjectValue.schemaVersion !== learnModeStateStorageSchemaVersionValue) {
        return false;
      }
      if (!Array.isArray(learnModeStatePlainObjectValue.poolEntryList)) {
        return false;
      }
      for (let poolEntryIndexValue = 0; poolEntryIndexValue < learnModeStatePlainObjectValue.poolEntryList.length; poolEntryIndexValue += 1) {
        const poolEntryFromStorageValue = learnModeStatePlainObjectValue.poolEntryList[poolEntryIndexValue];
        if (
          !poolEntryFromStorageValue
          || typeof poolEntryFromStorageValue.simplifiedCharacterKey !== "string"
          || typeof poolEntryFromStorageValue.weight !== "number"
        ) {
          return false;
        }
      }
      return true;
    };

    const applyLearnModeStateFromPlainObject = (learnModeStatePlainObjectValue) => {
      if (!isValidLearnModeStatePlainObjectForApply(learnModeStatePlainObjectValue)) {
        return false;
      }
      const restoredLearnModePoolList = [];
      for (
        let poolEntryIndexValue = 0;
        poolEntryIndexValue < learnModeStatePlainObjectValue.poolEntryList.length;
        poolEntryIndexValue += 1
      ) {
        const poolEntryFromStorageValue = learnModeStatePlainObjectValue.poolEntryList[poolEntryIndexValue];
        const matchedCardDataValue = findCardDataBySimplifiedKeyInRandomizedDeck(poolEntryFromStorageValue.simplifiedCharacterKey);
        if (matchedCardDataValue) {
          restoredLearnModePoolList.push({
            cardData: matchedCardDataValue,
            weight: poolEntryFromStorageValue.weight
          });
        }
      }
      isLearnModeEnabledValue = Boolean(learnModeStatePlainObjectValue.learnModeEnabled);
      learnModePoolList = restoredLearnModePoolList;
      const clampedPoolIndexValue = Math.min(
        Math.max(0, Number(learnModeStatePlainObjectValue.currentLearnModePoolIndexValue) || 0),
        Math.max(0, learnModePoolList.length - 1)
      );
      currentLearnModePoolIndexValue = learnModePoolList.length > 0 ? clampedPoolIndexValue : 0;
      const maxDeckIndexValue = randomizedFlashCardDataList.length;
      learnModeDeckIndexValue = Math.min(
        Math.max(0, Number(learnModeStatePlainObjectValue.learnModeDeckIndexValue) || 0),
        maxDeckIndexValue
      );
      learnModeLabelElement.textContent = isLearnModeEnabledValue ? "Learn Mode" : "Ordered Mode";
      persistLearnModeStateBundleToLocalStorage();
      syncLearnModeStateAsideColumnVisibilityFromLearnModeEnabled();
      hasSeenCountIncrementedValue = false;
      updateSeenCountForCurrentCard();
      renderCardContent();
      return true;
    };

    const resetLearnModeStateCompletelyAndPersist = () => {
      if(!confirm("Are you sure you want to reset the learn mode state?")) {
        return;
      }
      isLearnModeEnabledValue = false;
      learnModePoolList = [];
      currentLearnModePoolIndexValue = 0;
      learnModeDeckIndexValue = 0;
      learnModeLabelElement.textContent = "Ordered Mode";
      localStorage.removeItem(localStorageKeyNameMap.learnModeState);
      saveLearnModeEnabledValueToLocalStorage(false);
      syncLearnModeStateAsideColumnVisibilityFromLearnModeEnabled();
      hasSeenCountIncrementedValue = false;
      updateSeenCountForCurrentCard();
      renderCardContent();
    };

    const flashCardElement = document.getElementById("flashCardElement");
    const cardContentElement = document.getElementById("cardContentElement");
    const previousButtonElement = document.getElementById("previousButtonElement");
    const nextButtonElement = document.getElementById("nextButtonElement");
    const previousButtonHoldProgressFillElement = document.getElementById("previousButtonHoldProgressFillElement");
    const nextButtonHoldProgressFillElement = document.getElementById("nextButtonHoldProgressFillElement");
    const previousButtonLabelSpanElement = document.getElementById("previousButtonLabelSpanElement");
    const nextButtonLabelSpanElement = document.getElementById("nextButtonLabelSpanElement");
    const nightModeToggleButtonElement = document.getElementById("nightModeToggleButtonElement");
    const learnModeLabelElement = document.getElementById("learnModeLabelElement");
    const learnModeSwitchButtonElement = document.getElementById("learnModeSwitchButtonElement");
    const learnModeStateDownloadButtonElement = document.getElementById("learnModeStateDownloadButtonElement");
    const learnModeStateUploadButtonElement = document.getElementById("learnModeStateUploadButtonElement");
    const learnModeStateResetButtonElement = document.getElementById("learnModeStateResetButtonElement");
    const learnModeStateFileInputElement = document.getElementById("learnModeStateFileInputElement");
    const learnModeStateAsideColumnElement = document.getElementById("learnModeStateAsideColumnElement");
    const ttsButtonElement = document.getElementById("ttsButtonElement");
    const hskLevelSelectElement = document.getElementById("hskLevelSelectElement");
    const frequencySelectElement = document.getElementById("frequencySelectElement");
    const positionTextElement = document.getElementById("positionTextElement");

    const syncLearnModeStateAsideColumnVisibilityFromLearnModeEnabled = () => {
      learnModeStateAsideColumnElement.hidden = !isLearnModeEnabledValue;
    };

    const shuffleFlashCardDataList = (flashCardDataListValue) => {
      for (let shuffleIndexValue = flashCardDataListValue.length - 1; shuffleIndexValue > 0; shuffleIndexValue -= 1) {
        const randomSwapIndexValue = Math.floor(Math.random() * (shuffleIndexValue + 1));
        const swapValue = flashCardDataListValue[shuffleIndexValue];
        flashCardDataListValue[shuffleIndexValue] = flashCardDataListValue[randomSwapIndexValue];
        flashCardDataListValue[randomSwapIndexValue] = swapValue;
      }
      return flashCardDataListValue;
    };

    const getFilteredFlashCardDataListForSelections = (hskLevelSelectionValue, frequencySelectionValue) => {
      const maxHskLevelValue = hskLevelSelectionValue === "all"
        ? null
        : Number.parseInt(hskLevelSelectionValue, 10);
      const maxFrequencyRankValue = frequencySelectionValue === "all"
        ? null
        : Number.parseInt(frequencySelectionValue, 10);
      return flashCardDataList.filter((flashCardDataValue) => {
        const matchesHskSelectionValue = maxHskLevelValue === null
          ? true
          : flashCardDataValue.hskLevel !== null && flashCardDataValue.hskLevel <= maxHskLevelValue;
        const matchesFrequencySelectionValue = maxFrequencyRankValue === null
          ? true
          : flashCardDataValue.frequencyRank !== null && flashCardDataValue.frequencyRank <= maxFrequencyRankValue;
        return matchesHskSelectionValue && matchesFrequencySelectionValue;
      });
    };

    const learnModePoolInitialSizeValue = 5;
    const learnModeWrongWeightMultiplierValue = 1.05;
    const learnModeMaxProbabilityValue = 0.2;
    const learnModeRightWeightMultiplierValue = 0.5;
    const learnModeLowWeightThresholdValue = 0.25;

    let randomizedFlashCardDataList = [];
    let currentCardIndexValue = 0;
    let isDetailViewVisibleValue = false;
    let currentCardSeenCountValue = 0;
    let seenCountByCharacterMapValue = loadSeenCountByCharacterMapFromLocalStorage();
    let isLearnModeEnabledValue = false;
    let learnModePoolList = [];
    let currentLearnModePoolIndexValue = 0;
    let learnModeDeckIndexValue = 0;
    let hasSeenCountIncrementedValue = false;
    let isSpeechVoiceLoadPendingValue = false;

    (() => {
      if (typeof radicalMapping === "undefined") return;
      const allRadicalCharactersFromMappingValue = [...new Set(Object.values(radicalMapping).flat())];
      const charactersWithDefinitionInFlashCardListValue = new Set(flashCardDataList.flatMap((flashCardDataValue) => [flashCardDataValue.traditional, flashCardDataValue.simplified]));
      const radicalMappingValuesWithoutDefinitionInFlashCardListValue = allRadicalCharactersFromMappingValue.filter((radicalCharacterValue) => !charactersWithDefinitionInFlashCardListValue.has(radicalCharacterValue));
      console.log("radicalMapping values without definition in flashCardDataList", radicalMappingValuesWithoutDefinitionInFlashCardListValue.sort());
    })();

    const updateSeenCountForCurrentCard = () => {
      const effectiveCardDataValue = isLearnModeEnabledValue && learnModePoolList.length > 0
        ? learnModePoolList[currentLearnModePoolIndexValue].cardData
        : randomizedFlashCardDataList[currentCardIndexValue];
      if (!effectiveCardDataValue) {
        currentCardSeenCountValue = 0;
        return;
      }
      if (hasSeenCountIncrementedValue) {
        return;
      }
      const currentCardDataValue = effectiveCardDataValue;
      const seenCountKeyValue = getSeenCountKeyFromCardData(currentCardDataValue);
      const currentSeenCountValue = Number(seenCountByCharacterMapValue[seenCountKeyValue] || 0) + 1;
      seenCountByCharacterMapValue[seenCountKeyValue] = currentSeenCountValue;
      currentCardSeenCountValue = currentSeenCountValue;
      saveSeenCountByCharacterMapToLocalStorage(seenCountByCharacterMapValue);
      hasSeenCountIncrementedValue = true;
    };

    const setNightModeEnabledValue = (nightModeEnabledValue) => {
      document.body.classList.toggle("nightModeActive", nightModeEnabledValue);
      nightModeToggleButtonElement.textContent = nightModeEnabledValue ? "Day Mode" : "Night Mode";
      saveNightModeEnabledValueToLocalStorage(nightModeEnabledValue);
    };

    const getLearnModePoolKeysSet = () => new Set(learnModePoolList.map((entryValue) => getSeenCountKeyFromCardData(entryValue.cardData)));

    const tryAddNewCharacterToLearnModePool = () => {
      const totalWeightValue = learnModePoolList.reduce((sumValue, entryValue) => sumValue + entryValue.weight, 0);
      const allWeightsSufficientlyLowValue = learnModePoolList.every((entryValue) => entryValue.weight <= learnModeLowWeightThresholdValue);
      if (!allWeightsSufficientlyLowValue || learnModeDeckIndexValue >= randomizedFlashCardDataList.length) return;
      const poolKeysSetValue = getLearnModePoolKeysSet();
      while (learnModeDeckIndexValue < randomizedFlashCardDataList.length) {
        const candidateCardDataValue = randomizedFlashCardDataList[learnModeDeckIndexValue];
        learnModeDeckIndexValue += 1;
        if (poolKeysSetValue.has(getSeenCountKeyFromCardData(candidateCardDataValue))) continue;
        learnModePoolList.push({ cardData: candidateCardDataValue, weight: 1 });
        return;
      }
    };

    const pickNextLearnModeCardIndexByWeight = (indexToExcludeValue) => {
      const indicesToConsiderValue = indexToExcludeValue >= 0 && indexToExcludeValue < learnModePoolList.length
        ? learnModePoolList.map((_, indexValue) => indexValue).filter((indexValue) => indexValue !== indexToExcludeValue)
        : learnModePoolList.map((_, indexValue) => indexValue);
      const totalWeightValue = indicesToConsiderValue.reduce((sumValue, indexValue) => sumValue + learnModePoolList[indexValue].weight, 0);
      if (totalWeightValue <= 0 || indicesToConsiderValue.length === 0) return 0;
      let randomValue = Math.random() * totalWeightValue;
      for (let indexValue = 0; indexValue < indicesToConsiderValue.length; indexValue += 1) {
        const poolIndexValue = indicesToConsiderValue[indexValue];
        randomValue -= learnModePoolList[poolIndexValue].weight;
        if (randomValue <= 0) return poolIndexValue;
      }
      return indicesToConsiderValue[indicesToConsiderValue.length - 1];
    };

    const updateRandomizedFlashCardDataListForSelection = () => {
      const hskLevelSelectionValue = loadHskLevelSelectionValueFromLocalStorage();
      const frequencySelectionValue = loadFrequencySelectionValueFromLocalStorage();
      const filteredFlashCardDataList = getFilteredFlashCardDataListForSelections(
        hskLevelSelectionValue,
        frequencySelectionValue
      );
      randomizedFlashCardDataList = shuffleFlashCardDataList(filteredFlashCardDataList);
      currentCardIndexValue = 0;
      isDetailViewVisibleValue = false;
      hasSeenCountIncrementedValue = false;
      learnModePoolList = [];
      learnModeDeckIndexValue = 0;
      currentLearnModePoolIndexValue = 0;
      if (isLearnModeEnabledValue && randomizedFlashCardDataList.length > 0) {
        const poolKeysSetValue = new Set();
        for (let indexValue = 0; indexValue < randomizedFlashCardDataList.length && learnModePoolList.length < learnModePoolInitialSizeValue; indexValue += 1) {
          const cardDataValue = randomizedFlashCardDataList[indexValue];
          const keyValue = getSeenCountKeyFromCardData(cardDataValue);
          if (poolKeysSetValue.has(keyValue)) continue;
          poolKeysSetValue.add(keyValue);
          learnModePoolList.push({ cardData: cardDataValue, weight: 1 });
          learnModeDeckIndexValue = indexValue + 1;
        }
        currentLearnModePoolIndexValue = learnModePoolList.length > 0 ? pickNextLearnModeCardIndexByWeight() : 0;
      }
      updateSeenCountForCurrentCard();
      renderCardContent();
    };

    const setLearnModeEnabledValue = (learnModeEnabledValue) => {
      isLearnModeEnabledValue = learnModeEnabledValue;
      if (learnModeEnabledValue && randomizedFlashCardDataList.length > 0 && learnModePoolList.length === 0) {
        const poolKeysSetValue = new Set();
        for (let indexValue = 0; indexValue < randomizedFlashCardDataList.length && learnModePoolList.length < learnModePoolInitialSizeValue; indexValue += 1) {
          const cardDataValue = randomizedFlashCardDataList[indexValue];
          const keyValue = getSeenCountKeyFromCardData(cardDataValue);
          if (poolKeysSetValue.has(keyValue)) continue;
          poolKeysSetValue.add(keyValue);
          learnModePoolList.push({ cardData: cardDataValue, weight: 1 });
          learnModeDeckIndexValue = indexValue + 1;
        }
        currentLearnModePoolIndexValue = learnModePoolList.length > 0 ? pickNextLearnModeCardIndexByWeight() : 0;
      }
      learnModeLabelElement.textContent = learnModeEnabledValue ? "Learn Mode" : "Ordered Mode";
      persistLearnModeStateBundleToLocalStorage();
      syncLearnModeStateAsideColumnVisibilityFromLearnModeEnabled();
      renderCardContent();
    };

    const getSpeechTextFromCardData = (cardDataValue) => {
      if (cardDataValue.simplified) {
        return cardDataValue.simplified;
      }
      return cardDataValue.traditional || "";
    };

    const isSpeechSynthesisAvailableValue = () => {
      return "speechSynthesis" in window && "SpeechSynthesisUtterance" in window;
    };

    const getPreferredSpeechSynthesisVoiceValue = () => {
      const availableSpeechVoiceList = window.speechSynthesis.getVoices();
      if (!availableSpeechVoiceList || availableSpeechVoiceList.length === 0) {
        return null;
      }
      const preferredVoiceValue = availableSpeechVoiceList.find((voiceValue) =>
        voiceValue.lang && voiceValue.lang.toLowerCase().startsWith("zh")
      );
      return preferredVoiceValue || null;
    };

    const speakCurrentCardText = () => {
      if (!isSpeechSynthesisAvailableValue()) {
        alert("Speech synthesis is not available in your browser. Please try a different browser.");
        return;
      }
      const selectedVoiceValue = getPreferredSpeechSynthesisVoiceValue();
      if (!selectedVoiceValue) {
        if (!isSpeechVoiceLoadPendingValue) {
          isSpeechVoiceLoadPendingValue = true;
          window.speechSynthesis.onvoiceschanged = () => {
            isSpeechVoiceLoadPendingValue = false;
            speakCurrentCardText();
          };
        }
        return;
      }
      const currentCardDataForSpeechValue = isLearnModeEnabledValue && learnModePoolList.length > 0
        ? learnModePoolList[currentLearnModePoolIndexValue].cardData
        : randomizedFlashCardDataList[currentCardIndexValue];
      if (!currentCardDataForSpeechValue) {
        alert("No cards to speak.");
        return;
      }
      const currentCardDataValue = currentCardDataForSpeechValue;
      const speechTextValue = getSpeechTextFromCardData(currentCardDataValue);
      if (!speechTextValue) {
        alert("No text to speak.");
        return;
      }
      window.speechSynthesis.cancel();
      const speechUtteranceValue = new SpeechSynthesisUtterance(speechTextValue);
      speechUtteranceValue.lang = "zh-CN";
      speechUtteranceValue.voice = selectedVoiceValue;
      speechUtteranceValue.volume = 1;
      speechUtteranceValue.rate = 1;
      if(pageLoadTime + 3000 > Date.now()) {
        clearTimeout(ttsTimeoutIdValue);
        ttsTimeoutIdValue = setTimeout(() => {
          window.speechSynthesis.speak(speechUtteranceValue);
        }, 3000);
      }
      window.speechSynthesis.speak(speechUtteranceValue);
    };

    const renderCardContent = () => {
      if (randomizedFlashCardDataList.length === 0 && !(isLearnModeEnabledValue && learnModePoolList.length > 0)) {
        positionTextElement.textContent = "0 / 0";
        previousButtonLabelSpanElement.textContent = isLearnModeEnabledValue ? "Wrong" : "Previous";
        nextButtonLabelSpanElement.textContent = isLearnModeEnabledValue ? "Right" : "Next";
        previousButtonElement.disabled = true;
        nextButtonElement.disabled = true;
        cardContentElement.innerHTML = `
          <div class="cardContent">
            <div class="detailRow">
              <div>
                <div class="detailLabel">No cards</div>
                <div>Adjust HSK level</div>
              </div>
            </div>
          </div>
        `;
        return;
      }
      const currentCardData = isLearnModeEnabledValue && learnModePoolList.length > 0
        ? learnModePoolList[currentLearnModePoolIndexValue].cardData
        : (currentCardIndexValue < 0 || currentCardIndexValue >= randomizedFlashCardDataList.length ? (currentCardIndexValue = 0, randomizedFlashCardDataList[currentCardIndexValue]) : randomizedFlashCardDataList[currentCardIndexValue]);
      if (!isLearnModeEnabledValue && (currentCardIndexValue < 0 || currentCardIndexValue >= randomizedFlashCardDataList.length)) {
        currentCardIndexValue = 0;
      }
      positionTextElement.textContent = isLearnModeEnabledValue && learnModePoolList.length > 0
        ? `Pool: ${learnModePoolList.length}`
        : `${currentCardIndexValue + 1} / ${randomizedFlashCardDataList.length}`;
      if (isLearnModeEnabledValue) {
        previousButtonLabelSpanElement.textContent = "Wrong";
        nextButtonLabelSpanElement.textContent = "Right";
        previousButtonElement.disabled = learnModePoolList.length === 0;
        nextButtonElement.disabled = learnModePoolList.length === 0;
      } else {
        previousButtonLabelSpanElement.textContent = "Previous";
        nextButtonLabelSpanElement.textContent = "Next";
        previousButtonElement.disabled = currentCardIndexValue === 0;
        nextButtonElement.disabled = currentCardIndexValue === randomizedFlashCardDataList.length - 1;
      }

      if (!isDetailViewVisibleValue) {
        cardContentElement.innerHTML = `
          <div class="cardContent">
            <div class="characterRow">
              ${currentCardData.traditional != currentCardData.simplified ? (
              `
              <div>
                <div class="characterLabel">Traditional</div>
                <div class="characterValue">${currentCardData.traditional}</div>
              </div>
              <div>
                <div class="characterLabel">Simplified</div>
                <div class="characterValue">${currentCardData.simplified}</div>
              </div>
              `
              ) : (
                `
                <div>
                  <div class="characterValue">${currentCardData.simplified}</div>
                </div>
                `
              )}
            </div>
            <div class="seenCountText">Seen ${currentCardSeenCountValue} time${currentCardSeenCountValue === 1 ? "" : "s"}</div>
          </div>
        `;
        return;
      }

      const characterForRadicalLookup = currentCardData.traditional;
      const radicalsFromMapping = (typeof radicalMapping !== "undefined" && radicalMapping[characterForRadicalLookup]) ? radicalMapping[characterForRadicalLookup] : [];
      const mainRadicalForCard = radicalsFromMapping[0] || "";
      const radicalMetadataForCard = (mainRadicalForCard)=>{
        return radicalList.find((radical) => radical.radical === mainRadicalForCard || radical.variants.includes(mainRadicalForCard));
      }
      const radicalToHtml = (radical) => {
        return `${radical.radical} ${radical.variants.length > 0 ? `(${radical.variants})` : ""}:
        ${radical.meaning}`;
      }

      cardContentElement.innerHTML = `
        <div class="cardContent">
          <div class="characterRow">
            ${currentCardData.traditional != currentCardData.simplified ? (
              `
              <div>${currentCardData.traditional} / ${currentCardData.simplified}</div>
              `
            ) : (
              `
              <div>${currentCardData.simplified}</div>
              `
            )}
          </div>
          <div class="detailRow">
            <div>
              <div class="detailPinyinTextValue">${currentCardData.pinyin}</div>
            </div>
            <div>
              <div>${currentCardData.definition}</div>
            </div>
            <div>
              <div class="detailLabel">Radical</div>
              <div>
                ${radicalsFromMapping.map((oneradical)=>{ 
                    const metadataForRadical = radicalMetadataForCard(oneradical); 
                    if (metadataForRadical) return radicalToHtml(metadataForRadical); 
                    const flashCardEntryForRadical = flashCardDataList.find((flashCardDataValue) => 
                    flashCardDataValue.traditional === oneradical || flashCardDataValue.simplified === oneradical);
                    return flashCardEntryForRadical ? `${flashCardEntryForRadical.traditional}: ${flashCardEntryForRadical.definition}` : oneradical; }
                  ).join("<br/>")}
                </div>
            </div>
            <div class="detailRow" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;">
              <div class="unimportantInfo">
              <div class="detailLabel">Stroke Count</div>
              <div>${currentCardData.strokeCount}</div>
            </div>
              <div class="unimportantInfo">
              <div class="detailLabel">HSK Level</div>
              <div>${currentCardData.hskLevel}</div>
            </div>
              <div class="unimportantInfo">
              <div class="detailLabel">Frequency Rank</div>
              <div>${currentCardData.frequencyRank}</div>
              </div>
              <div class="unimportantInfo">
                <div class="detailLabel">Seen Count</div>
                <div>${currentCardSeenCountValue}</div>
              </div>
            </div>
          </div>
        </div>
      `;
    };

    registerDebouncedClickHandler(flashCardElement, () => {
      isDetailViewVisibleValue = !isDetailViewVisibleValue;
      renderCardContent();
    });

    const runPreviousNavigationButtonAction = () => {
      if (isLearnModeEnabledValue && learnModePoolList.length > 0) {
        if (!isDetailViewVisibleValue) {
          isDetailViewVisibleValue = true;
          renderCardContent();
          return;
        }
        const entryValue = learnModePoolList[currentLearnModePoolIndexValue];
        entryValue.weight *= learnModeWrongWeightMultiplierValue;
        const totalWeightValue = learnModePoolList.reduce((sumValue, e) => sumValue + e.weight, 0);
        if (totalWeightValue > 0 && entryValue.weight / totalWeightValue > learnModeMaxProbabilityValue) {
          entryValue.weight = learnModeMaxProbabilityValue * totalWeightValue;
        }
        tryAddNewCharacterToLearnModePool();
        currentLearnModePoolIndexValue = pickNextLearnModeCardIndexByWeight(currentLearnModePoolIndexValue);
        isDetailViewVisibleValue = false;
        hasSeenCountIncrementedValue = false;
        updateSeenCountForCurrentCard();
        persistLearnModeStateBundleToLocalStorage();
        renderCardContent();
        return;
      }
      if (currentCardIndexValue === 0) return;
      currentCardIndexValue -= 1;
      isDetailViewVisibleValue = false;
      hasSeenCountIncrementedValue = false;
      updateSeenCountForCurrentCard();
      renderCardContent();
    };

    const runNextNavigationButtonAction = () => {
      if (isLearnModeEnabledValue && learnModePoolList.length > 0) {
        if (!isDetailViewVisibleValue) {
          isDetailViewVisibleValue = true;
          renderCardContent();
          return;
        }
        learnModePoolList[currentLearnModePoolIndexValue].weight *= learnModeRightWeightMultiplierValue;
        tryAddNewCharacterToLearnModePool();
        currentLearnModePoolIndexValue = pickNextLearnModeCardIndexByWeight(currentLearnModePoolIndexValue);
        isDetailViewVisibleValue = false;
        hasSeenCountIncrementedValue = false;
        updateSeenCountForCurrentCard();
        persistLearnModeStateBundleToLocalStorage();
        renderCardContent();
        return;
      }
      if (currentCardIndexValue === randomizedFlashCardDataList.length - 1) return;
      currentCardIndexValue += 1;
      isDetailViewVisibleValue = false;
      hasSeenCountIncrementedValue = false;
      updateSeenCountForCurrentCard();
      renderCardContent();
    };

    const getShouldRequireHoldDurationBeforeWrongOrRightNavButtonActionValue = () => isDetailViewVisibleValue;

    const previousNavButtonHoldInteractionController = createNavButtonHoldInteractionController(
      previousButtonElement,
      previousButtonHoldProgressFillElement,
      runPreviousNavigationButtonAction,
      getShouldRequireHoldDurationBeforeWrongOrRightNavButtonActionValue
    );
    const nextNavButtonHoldInteractionController = createNavButtonHoldInteractionController(
      nextButtonElement,
      nextButtonHoldProgressFillElement,
      runNextNavigationButtonAction,
      getShouldRequireHoldDurationBeforeWrongOrRightNavButtonActionValue
    );

    document.addEventListener("visibilitychange", () => {
      logChineseFlashCardsDiagnosticMessage(
        "visibilitychange",
        document.visibilityState,
        "performanceNow",
        Math.round(performance.now())
      );
      if (document.visibilityState === "visible") {
        previousNavButtonHoldInteractionController.cancelNavButtonHoldInteraction();
        nextNavButtonHoldInteractionController.cancelNavButtonHoldInteraction();
        logChineseFlashCardsDiagnosticMessage(
          "visibility visible: reset nav hold timers (recovery after idle / lost keyup)"
        );
      }
    });

    const isKeyboardArrowShortcutBlockedForFocusValue = () => {
      const activeElementValue = document.activeElement;
      if (!activeElementValue || activeElementValue === document.body) {
        return false;
      }
      const activeTagNameUppercaseValue = activeElementValue.tagName;
      return activeTagNameUppercaseValue === "SELECT"
        || activeTagNameUppercaseValue === "INPUT"
        || activeTagNameUppercaseValue === "TEXTAREA";
    };

    document.addEventListener("keydown", (keyboardEventValue) => {
      if (isKeyboardArrowShortcutBlockedForFocusValue()) {
        return;
      }
      if (keyboardEventValue.code === "ArrowUp") {
        keyboardEventValue.preventDefault();
        if (isDetailViewVisibleValue) {
          isDetailViewVisibleValue = false;
          renderCardContent();
        } else {
          speakCurrentCardText();
        }
        return;
      }
      if (keyboardEventValue.code === "ArrowDown") {
        keyboardEventValue.preventDefault();
        if (!isDetailViewVisibleValue) {
          isDetailViewVisibleValue = true;
          renderCardContent();
        } else {
          speakCurrentCardText();
        }
        return;
      }
      if (keyboardEventValue.code === "ArrowLeft") {
        if (keyboardEventValue.repeat) {
          return;
        }
        keyboardEventValue.preventDefault();
        previousNavButtonHoldInteractionController.startNavButtonHoldInteraction(true);
        return;
      }
      if (keyboardEventValue.code === "ArrowRight") {
        if (keyboardEventValue.repeat) {
          return;
        }
        keyboardEventValue.preventDefault();
        nextNavButtonHoldInteractionController.startNavButtonHoldInteraction(true);
        return;
      }
    });

    document.addEventListener("keyup", (keyboardEventValue) => {
      if (keyboardEventValue.code === "ArrowLeft") {
        previousNavButtonHoldInteractionController.cancelNavButtonHoldInteraction();
      }
      if (keyboardEventValue.code === "ArrowRight") {
        nextNavButtonHoldInteractionController.cancelNavButtonHoldInteraction();
      }
    });

    registerDebouncedClickHandler(nightModeToggleButtonElement, () => {
      const nextNightModeEnabledValue = !document.body.classList.contains("nightModeActive");
      setNightModeEnabledValue(nextNightModeEnabledValue);
    });

    registerDebouncedClickHandler(learnModeSwitchButtonElement, () => {
      setLearnModeEnabledValue(!isLearnModeEnabledValue);
    });

    registerDebouncedClickHandler(learnModeStateDownloadButtonElement, () => {
      const learnModeStateJsonStringValue = JSON.stringify(buildLearnModeStatePlainObjectForStorage(), null, 2);
      const learnModeStateBlobValue = new Blob([learnModeStateJsonStringValue], { type: "application/json" });
      const learnModeStateObjectUrlValue = URL.createObjectURL(learnModeStateBlobValue);
      const learnModeStateAnchorElement = document.createElement("a");
      learnModeStateAnchorElement.href = learnModeStateObjectUrlValue;
      learnModeStateAnchorElement.download = "chinese-flash-cards-learn-mode-state.json";
      learnModeStateAnchorElement.click();
      URL.revokeObjectURL(learnModeStateObjectUrlValue);
    });

    registerDebouncedClickHandler(learnModeStateUploadButtonElement, () => {
      learnModeStateFileInputElement.value = "";
      learnModeStateFileInputElement.click();
    });

    ttsButtonElement.addEventListener("click", () => {
      speakCurrentCardText();
    });

    learnModeStateFileInputElement.addEventListener("change", () => {
      const selectedLearnModeStateFileValue = learnModeStateFileInputElement.files && learnModeStateFileInputElement.files[0];
      if (!selectedLearnModeStateFileValue) {
        return;
      }
      const learnModeStateFileReaderValue = new FileReader();
      learnModeStateFileReaderValue.onload = () => {
        try {
          const importedLearnModeStatePlainObjectValue = JSON.parse(String(learnModeStateFileReaderValue.result || ""));
          if (!applyLearnModeStateFromPlainObject(importedLearnModeStatePlainObjectValue)) {
            alert("Could not load learn mode state from file.");
          }
        } catch (errorValue) {
          alert("Could not load learn mode state from file.");
        }
      };
      learnModeStateFileReaderValue.readAsText(selectedLearnModeStateFileValue);
    });

    registerDebouncedClickHandler(learnModeStateResetButtonElement, () => {
      resetLearnModeStateCompletelyAndPersist();
    });

    hskLevelSelectElement.addEventListener("change", (eventValue) => {
      const nextHskLevelSelectionValue = eventValue.target.value;
      saveHskLevelSelectionValueToLocalStorage(nextHskLevelSelectionValue);
      updateRandomizedFlashCardDataListForSelection();
      persistLearnModeStateBundleToLocalStorage();
    });

    frequencySelectElement.addEventListener("change", (eventValue) => {
      const nextFrequencySelectionValue = eventValue.target.value;
      saveFrequencySelectionValueToLocalStorage(nextFrequencySelectionValue);
      updateRandomizedFlashCardDataListForSelection();
      persistLearnModeStateBundleToLocalStorage();
    });

    setNightModeEnabledValue(loadNightModeEnabledValueFromLocalStorage());
    updateRandomizedFlashCardDataListForSelection();
    const loadedLearnModeStatePlainObjectValue = loadLearnModeStatePlainObjectFromLocalStorage();
    if (!loadedLearnModeStatePlainObjectValue || !applyLearnModeStateFromPlainObject(loadedLearnModeStatePlainObjectValue)) {
      setLearnModeEnabledValue(loadLearnModeEnabledValueFromLocalStorage());
    }
    hskLevelSelectElement.value = loadHskLevelSelectionValueFromLocalStorage();
    if (!hskLevelSelectElement.value) {
      hskLevelSelectElement.value = "all";
      saveHskLevelSelectionValueToLocalStorage("all");
    }
    frequencySelectElement.value = loadFrequencySelectionValueFromLocalStorage();
    if (!frequencySelectElement.value) {
      frequencySelectElement.value = "all";
      saveFrequencySelectionValueToLocalStorage("all");
    }
  </script>
</body>
</html>
